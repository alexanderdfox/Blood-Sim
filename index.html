#stellar-stages { display:flex; flex-wrap:wrap; gap:4px; margin:12px 0; }

#current-stage { margin:8px 0; padding:6px 10px; background:rgba(255,120,0,0.2); border-radius:6px; font-size:12px; text-align:center; }

#controls button:hover { background:#333; }
#controls button#pause-btn.playing { background:#0a0; }
#log { margin-top:12px; font-size:10px; color:#0f8; max-height:110px; overflow-y:auto; background:rgba(0,30,0,0.6); padding:8px; border-radius:4px; line-height:1.3; }

// Auto-generate remaining elements
for (let z = 1; z <= 118; z++) {
	if (!ELEMENTS[z]) {
		const roots = ["nil","un","bi","tri","quad","pent","hex","sept","oct","enn"];
		let name = z.toString().split('').map(d => roots[parseInt(d)] || "").join("") + "ium";
		ELEMENTS[z] = { n: name.charAt(0).toUpperCase() + name.slice(1), s: "E"+z, d: "Synthetic / supernova product." };
	}
}

// ==================== STELLAR NUCLEOSYNTHESIS STAGES ====================
const STELLAR_STAGES = [
	{ id: 0, name: "Hydrogen Burning",  desc: "pp-chain / CNO → Helium",                     color: "#66ccff", temp: "15 MK" },
	{ id: 1, name: "Helium Burning",    desc: "Triple-alpha → Carbon & Oxygen",              color: "#ffaa33", temp: "100 MK" },
	{ id: 2, name: "Carbon Burning",    desc: "C + C → Neon, Mg, Na",                        color: "#ff7733", temp: "600 MK" },
	{ id: 3, name: "Neon/Oxygen Burning", desc: "Ne → O/Mg, O → Si/S",                     color: "#ff4422", temp: "1.5 GK" },
	{ id: 4, name: "Silicon Burning",   desc: "Si → Iron-peak (Fe/Ni)",                      color: "#eeeeee", temp: "3 GK" },
	{ id: 5, name: "Supernova (r-process)", desc: "Explosive neutron capture → heavy elements", color: "#cc66ff", temp: "explosive" }
];

let stellarStage = 0;   // current stage

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let atoms = [];
let curZ = 1;
let scaleMode = 'quantum';
let tScale = 1.0;
let gConst = 1.0;
let isPaused = false;
let fusionLog = [];

const pauseBtn = document.getElementById('pause-btn');

function togglePause() {
	isPaused = !isPaused;
	pauseBtn.textContent = isPaused ? "▶ Play" : "⏸ Pause";
	pauseBtn.classList.toggle('playing', isPaused);
}

function logFusion(message) {
	fusionLog.unshift(`[${STELLAR_STAGES[stellarStage].name}] ${message}`);
	if (fusionLog.length > 8) fusionLog.pop();
	document.getElementById('log').innerHTML = fusionLog.map(m => `• ${m}`).join('<br>');
}

function setScale(s) {
	scaleMode = s;
	document.querySelectorAll('.scale-select button').forEach(b => b.classList.remove('active'));
	document.getElementById('s-'+s).classList.add('active');
}

function setStellarStage(s) {
	stellarStage = s;
	document.querySelectorAll('#stellar-stages button').forEach(b => b.classList.remove('active'));
	document.getElementById('stage-'+s).classList.add('active');
	document.getElementById('stage-name').innerText = STELLAR_STAGES[s].name;
}

function getElementData(z) {
	return ELEMENTS[Math.floor(z)] || { n: "Unknown", s: "?", d: "" };
}

// Scientifically accurate stellar-stage-dependent byproducts
function getFusionByproducts(z1, z2) {
	const total = z1 + z2;
	const byproducts = [];
	const stage = STELLAR_STAGES[stellarStage];

	switch (stellarStage) {
		case 0: // Hydrogen Burning
			if (total === 2) byproducts.push(2);           // ¹H + ¹H → ⁴He (simplified)
			else if (Math.random() < 0.7) byproducts.push(2);
			else byproducts.push(1);
			break;

		case 1: // Helium Burning (triple-alpha)
			if (z1 === 2 && z2 === 2) byproducts.push(6);  // He + He → C (approximated)
			else if (Math.random() < 0.65) byproducts.push(6); // C
			else byproducts.push(8);                       // O
			break;

		case 2: // Carbon Burning
			byproducts.push(10);                           // Neon
			if (Math.random() < 0.5) byproducts.push(12);  // Magnesium
			break;

		case 3: // Neon / Oxygen Burning
			if (Math.random() < 0.6) byproducts.push(14);  // Silicon
			else byproducts.push(16);                      // Sulfur
			break;

		case 4: // Silicon Burning → iron peak
			if (Math.random() < 0.7) {
				byproducts.push(26);                       // Iron
			} else {
				byproducts.push(28);                       // Nickel
			}
			break;

		case 5: // Supernova / r-process
			if (Math.random() < 0.55) {
				// Explosive fission + neutron burst
				const split = Math.max(2, Math.floor(total * (0.3 + Math.random() * 0.4)));
				byproducts.push(split);
				byproducts.push(total - split);
			}
			// Add neutrons (treated as Z=1 for visuals)
			const neutrons = Math.floor(Math.random() * 5) + 2;
			for (let i = 0; i < neutrons; i++) byproducts.push(1);
			break;
	}

	// Fallback for any unhandled combinations (still realistic)
	if (byproducts.length === 0) {
		if (total < 28) {
			byproducts.push(Math.random() < 0.5 ? 2 : 1); // alpha or proton
		} else if (total > 80) {
			byproducts.push(1); byproducts.push(1); // neutrons
		} else {
			byproducts.push(1);
		}
	}
	return byproducts;
}

class Atom {
	constructor(z, x, y, vx = 0, vy = 0) {
		this.z = Math.max(1, Math.min(118, Math.floor(z)));
		this.x = x; this.y = y; this.vx = vx; this.vy = vy;
		this.flash = 0;
	}

	applyPhysics() {
		if (isPaused) return;

		for (let i = atoms.length - 1; i >= 0; i--) {
			const other = atoms[i];
			if (other === this) continue;

			let dx = other.x - this.x, dy = other.y - this.y;
			let d2 = dx*dx + dy*dy + 50;
			let d = Math.sqrt(d2);

			if (scaleMode === 'space') {
				let f = (0.5 * gConst * this.z * other.z) / d2;
				this.vx += (f * dx/d) / this.z;
				this.vy += (f * dy/d) / this.z;
			} else if (scaleMode === 'plasma') {
				this.vx *= 0.97; this.vy *= 0.97;
				if (d < 120) {
					this.vx += dx * 0.0012 * gConst;
					this.vy += dy * 0.0012 * gConst;
				}
			} else {
				this.vx += (Math.random()-0.5) * 0.6;
				if (d < 70) {
					this.vx += dx * 0.012 * gConst;
					this.vy += dy * 0.012 * gConst;
				}
			}

			if (d < (Math.sqrt(this.z) * 4.5 + Math.sqrt(other.z) * 4.5)) {
				let relV = Math.hypot(this.vx - other.vx, this.vy - other.vy);
				if (relV > 1.2 || scaleMode === 'quantum') {
					this.fuse(other);
					return;
				}
			}
		}

		if (scaleMode === 'plasma') this.vx += Math.sin(Date.now()*0.005) * 0.12;

		this.x += this.vx * tScale;
		this.y += this.vy * tScale;

		if (this.x < 0 || this.x > canvas.width) this.vx *= -0.75;
		if (this.y < 0 || this.y > canvas.height) this.vy *= -0.75;

		if (this.flash > 0) this.flash -= 0.08;
	}

	fuse(other) {
		const oldZ = this.z;
		const otherZ = other.z;
		const totalZ = oldZ + otherZ;

		const wasExothermic = totalZ < 28;

		this.z = Math.min(118, totalZ);
		this.vx = (this.vx * oldZ + other.vx * otherZ) / totalZ;
		this.vy = (this.vy * oldZ + other.vy * otherZ) / totalZ;

		atoms = atoms.filter(a => a !== other);

		const byproducts = getFusionByproducts(oldZ, otherZ);
		byproducts.forEach(bz => {
			if (bz < 1) return;
			const angle = Math.random() * Math.PI * 2;
			const speed = 3.5 + Math.random() * 4;
			atoms.push(new Atom(bz, this.x, this.y,
				this.vx + Math.cos(angle) * speed,
				this.vy + Math.sin(angle) * speed));
		});

		if (wasExothermic) this.flash = 1.2;

		let logMsg = `${getElementData(oldZ).s} + ${getElementData(otherZ).s} → ${getElementData(this.z).s}`;
		if (byproducts.length) logMsg += ` + ${byproducts.map(b => getElementData(b).s).join(' ')}`;
		if (!wasExothermic && stellarStage < 5) logMsg += " (endothermic)";
		logFusion(logMsg);

		this.updateUI();
	}

	updateUI() {
		const data = getElementData(this.z);
		document.getElementById('info-card').style.display = 'block';
		document.getElementById('node-name').innerText = data.n;
		document.getElementById('node-sym').innerText = data.s;
		document.getElementById('node-desc').innerText = data.d;
		document.getElementById('node-z').innerText = this.z;
	}

	draw() {
		let r = 5 + Math.sqrt(this.z) * 2.8;
		let hue = (this.z * 137) % 360;

		ctx.save();
		ctx.translate(this.x, this.y);

		// Stellar stage flash + quantum glow
		if (this.flash > 0 || scaleMode === 'quantum') {
			ctx.shadowBlur = 25 + this.flash * 25;
			ctx.shadowColor = this.flash > 0 ? '#ff0' : `hsl(${hue},100%,65%)`;
			ctx.fillStyle = `hsla(${hue},100%,60%,${0.15 + this.flash * 0.4})`;
			ctx.beginPath(); ctx.arc(0,0,r*4,0,6.28); ctx.fill();
		}

		// Nucleus
		ctx.fillStyle = `hsl(${hue},85%,55%)`;
		ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.fill();

		ctx.restore();
	}
}

function buildElementGrid() {
	const grid = document.getElementById('element-grid');
	grid.innerHTML = '';
	for (let z = 1; z <= 118; z++) {
		const data = getElementData(z);
		const btn = document.createElement('div');
		btn.className = 'element-btn';
		btn.innerHTML = `<span class="z">${z}</span><span>${data.s}</span>`;
		btn.title = data.n;
		btn.onclick = () => curZ = z;
		grid.appendChild(btn);
	}
}

function buildStellarStageButtons() {
	const container = document.getElementById('stellar-stages');
	container.innerHTML = '';
	STELLAR_STAGES.forEach(stage => {
		const btn = document.createElement('button');
		btn.id = 'stage-' + stage.id;
		btn.innerHTML = `<b>${stage.name}</b><br><small style="font-size:9px;opacity:0.8;">${stage.desc}</small>`;
		btn.style.borderColor = stage.color;
		btn.onclick = () => setStellarStage(stage.id);
		container.appendChild(btn);
	});
	// Activate first stage
	document.getElementById('stage-0').classList.add('active');
}

// Mouse controls
let mDown = false, sX, sY;
canvas.addEventListener('mousedown', e => {
	const target = atoms.find(a => Math.hypot(a.x - e.clientX, a.y - e.clientY) < 40);
	if (target) { target.updateUI(); return; }
	mDown = true; sX = e.clientX; sY = e.clientY;
});

window.addEventListener('mouseup', e => {
	if (!mDown) return;
	atoms.push(new Atom(curZ, sX, sY, (e.clientX - sX)*0.08, (e.clientY - sY)*0.08));
	mDown = false;
});

function loop() {
	canvas.width = innerWidth;
	canvas.height = innerHeight;

	// Background tint based on stellar stage (more realistic star-core colors)
	const stageColor = STELLAR_STAGES[stellarStage].color;
	ctx.fillStyle = scaleMode === 'plasma' ? '#0a0508' : '#000';
	ctx.fillRect(0, 0, canvas.width, canvas.height);
	ctx.fillStyle = stageColor + '22'; // subtle overlay
	ctx.fillRect(0, 0, canvas.width, canvas.height);

	atoms.forEach(a => a.applyPhysics());
	atoms.forEach(a => a.draw());

	requestAnimationFrame(loop);
}

// Initialize everything
buildElementGrid();
buildStellarStageButtons();
setScale('quantum');
setStellarStage(0);   // start in realistic H-burning
loop();
</script>
